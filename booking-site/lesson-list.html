<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lessons</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Language Lessons</h1>
            <ul class="nav-links">
                <li><a href="index.html">Book a Lesson</a></li>
                <li><a href="lessons.html">Access Lessons</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <a href="javascript:history.back()" class="back-button">← Back to Levels</a>
            <h2 id="page-title">Lessons</h2>
            <p id="page-subtitle">Select a lesson to begin</p>
        </section>

        <section class="search-section">
            <input type="text" id="search-input" class="search-bar" placeholder="Search lessons...">
        </section>

        <section class="lessons-section">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading lessons...</p>
            </div>

            <div id="error" class="error-message" style="display: none;">
                <p>Unable to load lessons. Please try again later.</p>
            </div>

            <div id="lessons-container" class="lessons-grid" style="display: none;">
                <!-- Lesson cards will be dynamically inserted here -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Language Lessons. All rights reserved.</p>
        </div>
    </footer>

    <script src="lesson-list.js"></script>
</body>
</html>
