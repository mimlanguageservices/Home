<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lessons</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Language Lessons</h1>
            <ul class="nav-links">
                <li><a href="index.html">Book a Lesson</a></li>
                <li><a href="lessons.html" class="active">Access Lessons</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h2>My Lessons</h2>
            <p>Access your personalized learning materials</p>
        </section>

        <section class="search-section">
            <input type="text" id="search-input" class="search-bar" placeholder="Search lesson types...">
        </section>

        <section class="lessons-section">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading lessons...</p>
            </div>

            <div id="error" class="error-message" style="display: none;">
                <p>Unable to load lessons. Please try again later.</p>
            </div>

            <div id="lessons-container" class="lessons-grid" style="display: none;">
                <!-- Lessons will be dynamically inserted here -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Language Lessons. All rights reserved.</p>
        </div>
    </footer>

    <script src="lessons.js"></script>
</body>
</html>
