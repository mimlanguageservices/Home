<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerome's Gym - MIM Language Services</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header-left { display: flex; flex-direction: column; }
        .header h1 { color: #2d3748; font-size: 2.5rem; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .header-image { width: 120px; height: 80px; border-radius: 12px; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .header .website { text-align: center; margin-top: 8px; }
        .header .website a { color: #4c51bf; text-decoration: none; font-size: 1.2rem; font-weight: 500; transition: color 0.3s; }
        .header .website a:hover { color: #553c9a; }

        /* ── Layout ── */
        .container { display: flex; height: calc(100vh - 120px); }

        .navigation {
            width: 280px;
            background: rgba(45, 55, 72, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }
        .nav-item {
            padding: 14px 20px;
            margin: 8px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.3;
        }
        .nav-item small { display: block; font-weight: 400; font-size: 0.78em; opacity: 0.8; margin-top: 3px; }
        .nav-item:hover { background: rgba(255,255,255,0.2); color: #fff; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .nav-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-color: transparent; box-shadow: 0 8px 25px rgba(102,126,234,0.3); }

        .content { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }

        .section { display: none; flex: 1; padding: 40px; overflow: hidden; height: 100%; }
        .section.active { display: flex; flex-direction: column; }
        .section h2 { color: #2d3748; margin-bottom: 15px; font-size: 2rem; font-weight: 700; text-align: center; letter-spacing: -0.5px; }

        /* ── Slideshow ── */
        .slideshow-section {
            padding: 0 !important;
            background: white;
            position: relative;
        }

        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 40px 100px;
        }

        .slide-counter {
            position: absolute;
            top: 18px;
            right: 28px;
            color: #9ca3af;
            font-size: 0.95rem;
            font-weight: 500;
            z-index: 10;
        }

        .slide-content-wrapper {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: 85%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gym-slide {
            display: none;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            flex-direction: row;
            gap: 30px;
        }
        .gym-slide.active {
            display: flex;
            animation: slideIn 0.4s ease-in-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* Slide left panel */
        .slide-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-right: 20px;
            max-width: 52%;
        }
        .slide-info h3 {
            font-size: 1.8rem;
            color: #2d3748;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .slide-focus {
            font-size: 1.05rem;
            color: #667eea;
            font-weight: 500;
            font-style: italic;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* Stat boxes */
        .stat-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .stat-box {
            flex: 1;
            min-width: 90px;
            background: linear-gradient(135deg, rgba(102,126,234,0.08) 0%, rgba(118,75,162,0.08) 100%);
            border: 1.5px solid rgba(102,126,234,0.25);
            border-radius: 14px;
            padding: 14px 16px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 1.35rem;
            font-weight: 700;
            color: #2d3748;
        }

        /* Slide right panel */
        .slide-image {
            width: 45%;
            max-width: 50%;
            height: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(102,126,234,0.12) 0%, rgba(118,75,162,0.12) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .slide-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
        }
        .slide-image-placeholder {
            color: #c7d2fe;
            font-size: 3rem;
            user-select: none;
        }

        /* Arrows */
        .slide-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #8B7EC8;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .slide-arrow:hover { background: #7366B0; transform: translateY(-50%) scale(1.1); }
        .slide-arrow.prev { left: -60px; }
        .slide-arrow.next { right: -60px; }

        /* Indicators */
        .slide-indicators {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 80%;
        }
        .indicator-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #D1D5DB;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .indicator-dot.active { background: #667eea; transform: scale(1.35); }
        .indicator-dot:hover { background: #9CA3AF; }

        /* Loading / error */
        .state-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            color: #718096;
            font-size: 1.1rem;
        }
        .state-message.error { color: #e53e3e; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(102,126,234,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .header { flex-direction: column; text-align: center; padding: 20px 15px; }
            .header h1 { font-size: 2rem; margin-bottom: 10px; }
            .header-image { width: 80px; height: 60px; margin-top: 10px; }
            .container { flex-direction: column; height: auto; }
            .navigation {
                width: 100%; padding: 15px;
                display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
                border-right: none; border-bottom: 1px solid rgba(255,255,255,0.2);
            }
            .nav-item { flex: 1; min-width: 110px; margin: 0; font-size: 0.85rem; padding: 10px 12px; border-radius: 18px; }
            .content { height: auto; overflow: visible; }
            .section { padding: 20px 15px; height: auto; overflow: visible; }
            .section.active { min-height: 80vh; }
            .slideshow-section { padding: 0 !important; min-height: 90vh; }
            .slideshow-container { padding: 20px 15px; height: auto; min-height: 85vh; }
            .slide-content-wrapper { height: auto; min-height: 75vh; max-width: 100%; }
            .gym-slide { flex-direction: column; height: auto; min-height: 70vh; padding: 24px 18px; }
            .slide-info { max-width: 100%; padding-right: 0; }
            .slide-info h3 { font-size: 1.4rem; }
            .slide-image { width: 100%; max-width: 100%; height: 220px; margin-top: 20px; }
            .slide-arrow.prev { left: -18px; }
            .slide-arrow.next { right: -18px; }
            .slide-arrow { width: 38px; height: 38px; }
            .stat-value { font-size: 1.15rem; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.6rem; }
            .nav-item { min-width: 95px; font-size: 0.8rem; }
            .slide-info h3 { font-size: 1.2rem; }
            .stat-box { padding: 10px 12px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h1>Jerome's Gym</h1>
            <div class="website">
                <a href="https://www.mimlanguageservices.com/" target="_blank">www.mimlanguageservices.com</a>
            </div>
        </div>
        <a href="https://www.mimlanguageservices.com/" target="_blank">
            <img src="https://static.wixstatic.com/media/593d03_8958d96b0f6d4d1ea9dffa7f89bffe8b~mv2.png" alt="MIM Logo" class="header-image">
        </a>
    </div>

    <div class="container">
        <div class="navigation">
            <div class="nav-item active" onclick="showSection('push', this)">
                Push<small>Chest, Shoulders, Triceps</small>
            </div>
            <div class="nav-item" onclick="showSection('pull', this)">
                Pull<small>Back, Rear Delts, Biceps</small>
            </div>
            <div class="nav-item" onclick="showSection('legs', this)">
                Legs<small>Quad Focused + Calves</small>
            </div>
            <div class="nav-item" onclick="showSection('upper', this)">
                Upper Body<small>General Hypertrophy</small>
            </div>
            <div class="nav-item" onclick="showSection('lower', this)">
                Lower Body<small>Posterior Chain Focused</small>
            </div>
        </div>

        <div class="content">
            <div class="section active" id="push">
                <div class="state-message"><div class="spinner"></div>Loading exercises…</div>
            </div>
            <div class="section" id="pull">
                <div class="state-message"><div class="spinner"></div>Loading exercises…</div>
            </div>
            <div class="section" id="legs">
                <div class="state-message"><div class="spinner"></div>Loading exercises…</div>
            </div>
            <div class="section" id="upper">
                <div class="state-message"><div class="spinner"></div>Loading exercises…</div>
            </div>
            <div class="section" id="lower">
                <div class="state-message"><div class="spinner"></div>Loading exercises…</div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1fK8pkodvit67qvqDyPG_FYiAYSeTRQ8z748EquHNsdc';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        // Per-tab current slide index (1-based)
        const slideState = { push: 1, pull: 1, legs: 1, upper: 1, lower: 1 };

        // Map Column A value → section id
        function resolveTabId(name) {
            const n = (name || '').toLowerCase().trim();
            if (n.includes('push'))  return 'push';
            if (n.includes('pull'))  return 'pull';
            if (n.includes('leg'))   return 'legs';
            if (n.includes('upper')) return 'upper';
            if (n.includes('lower')) return 'lower';
            return null;
        }

        function esc(v) {
            return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // Safely read a cell — handles Google's Date(year,month,day) values
        // that appear when a column has a date format applied in Sheets.
        function cellVal(cell) {
            if (!cell || cell.v === null || cell.v === undefined) return null;
            const v = cell.v;
            if (typeof v === 'string' && v.startsWith('Date(')) {
                // Prefer the formatted value if it looks like a plain number
                const f = String(cell.f ?? '').trim();
                if (/^\d+(\.\d+)?$/.test(f)) return f;
                // Otherwise extract the day component as a fallback
                const parts = v.match(/Date\(\d+,\d+,(\d+)\)/);
                return parts ? parts[1] : v;
            }
            return v;
        }

        // Parse Google Visualization JSON wrapper
        function parseGviz(text) {
            const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
            if (!match) throw new Error('Unexpected response format');
            const data = JSON.parse(match[1]);
            return (data.table.rows || [])
                .map(row => ({
                    tab:      row.c[0]?.v ?? '',
                    exercise: row.c[1]?.v ?? '',
                    weight:   cellVal(row.c[2]),
                    sets:     cellVal(row.c[3]),
                    reps:     cellVal(row.c[4]),
                    focus:    row.c[5]?.v ?? '',
                    image:    row.c[6]?.v ?? ''
                }))
                .filter(r => r.tab && r.exercise);
        }

        function buildSlideshow(sectionId, exercises) {
            const section = document.getElementById(sectionId);
            section.innerHTML = '';
            section.classList.add('slideshow-section');
            slideState[sectionId] = 1;

            const container = document.createElement('div');
            container.className = 'slideshow-container';

            // Slide counter label
            const counter = document.createElement('div');
            counter.className = 'slide-counter';
            counter.id = `counter-${sectionId}`;
            counter.textContent = `1 / ${exercises.length}`;
            container.appendChild(counter);

            // Wrapper holds arrows + slides
            const wrapper = document.createElement('div');
            wrapper.className = 'slide-content-wrapper';

            // Prev arrow
            const prev = document.createElement('button');
            prev.className = 'slide-arrow prev';
            prev.setAttribute('aria-label', 'Previous exercise');
            prev.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"/></svg>`;
            prev.onclick = () => changeSlide(sectionId, -1);
            wrapper.appendChild(prev);

            // Slides
            exercises.forEach((ex, i) => {
                const slide = document.createElement('div');
                slide.className = 'gym-slide' + (i === 0 ? ' active' : '');

                const hasImg = ex.image && ex.image.startsWith('http');

                // Build stat boxes only for fields that have a value
                const stats = [
                    { label: 'Weight', value: ex.weight },
                    { label: 'Sets',   value: ex.sets   },
                    { label: 'Reps',   value: ex.reps   }
                ].filter(s => s.value !== null && s.value !== '');

                const statHTML = stats.length
                    ? `<div class="stat-row">${stats.map(s => `
                        <div class="stat-box">
                            <div class="stat-label">${esc(s.label)}</div>
                            <div class="stat-value">${esc(String(s.value))}</div>
                        </div>`).join('')}
                      </div>`
                    : '';

                slide.innerHTML = `
                    <div class="slide-info">
                        <h3>${esc(ex.exercise)}</h3>
                        ${ex.focus ? `<div class="slide-focus">${esc(ex.focus)}</div>` : ''}
                        ${statHTML}
                    </div>
                    <div class="slide-image">
                        ${hasImg
                            ? `<img src="${esc(ex.image)}" alt="${esc(ex.exercise)}" onerror="this.parentElement.innerHTML='<span class=slide-image-placeholder>🏋️</span>'">`
                            : `<span class="slide-image-placeholder">🏋️</span>`}
                    </div>`;

                wrapper.appendChild(slide);
            });

            // Next arrow
            const next = document.createElement('button');
            next.className = 'slide-arrow next';
            next.setAttribute('aria-label', 'Next exercise');
            next.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg>`;
            next.onclick = () => changeSlide(sectionId, 1);
            wrapper.appendChild(next);

            container.appendChild(wrapper);

            // Dot indicators
            const dots = document.createElement('div');
            dots.className = 'slide-indicators';
            dots.id = `dots-${sectionId}`;
            exercises.forEach((_, i) => {
                const dot = document.createElement('span');
                dot.className = 'indicator-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(sectionId, i + 1);
                dots.appendChild(dot);
            });
            container.appendChild(dots);

            section.appendChild(container);
        }

        function changeSlide(sectionId, dir) {
            const section = document.getElementById(sectionId);
            const slides = section.querySelectorAll('.gym-slide');
            const dots   = section.querySelectorAll('.indicator-dot');
            const counter = document.getElementById(`counter-${sectionId}`);
            if (!slides.length) return;

            let cur = slideState[sectionId];
            slides[cur - 1].classList.remove('active');
            dots[cur - 1].classList.remove('active');

            cur += dir;
            if (cur > slides.length) cur = 1;
            if (cur < 1) cur = slides.length;

            slideState[sectionId] = cur;
            slides[cur - 1].classList.add('active');
            dots[cur - 1].classList.add('active');
            if (counter) counter.textContent = `${cur} / ${slides.length}`;
        }

        function goToSlide(sectionId, num) {
            const section = document.getElementById(sectionId);
            const slides = section.querySelectorAll('.gym-slide');
            const dots   = section.querySelectorAll('.indicator-dot');
            const counter = document.getElementById(`counter-${sectionId}`);
            if (!slides.length) return;

            const cur = slideState[sectionId];
            slides[cur - 1].classList.remove('active');
            dots[cur - 1].classList.remove('active');

            slideState[sectionId] = num;
            slides[num - 1].classList.add('active');
            dots[num - 1].classList.add('active');
            if (counter) counter.textContent = `${num} / ${slides.length}`;
        }

        // Keyboard navigation on the active tab
        document.addEventListener('keydown', e => {
            const activeSection = document.querySelector('.section.active');
            if (!activeSection) return;
            if (e.key === 'ArrowLeft')  changeSlide(activeSection.id, -1);
            if (e.key === 'ArrowRight') changeSlide(activeSection.id,  1);
        });

        function showSection(sectionId, navItem) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            navItem.classList.add('active');
        }

        function showError(sectionId, msg) {
            const section = document.getElementById(sectionId);
            section.innerHTML = `<div class="state-message error">${msg}</div>`;
        }

        function showEmpty(sectionId) {
            const section = document.getElementById(sectionId);
            section.innerHTML = `<div class="state-message">No exercises added for this day yet.</div>`;
        }

        async function loadData() {
            let rows;
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                rows = parseGviz(text);
            } catch (err) {
                console.error(err);
                ['push','pull','legs','upper','lower'].forEach(id =>
                    showError(id, 'Could not load data. Make sure the Google Sheet is shared as "Anyone with the link can view".')
                );
                return;
            }

            // Group by tab
            const groups = { push: [], pull: [], legs: [], upper: [], lower: [] };
            rows.forEach(row => {
                const id = resolveTabId(row.tab);
                if (id) groups[id].push(row);
            });

            // Render each tab
            Object.entries(groups).forEach(([id, exercises]) => {
                if (exercises.length) {
                    buildSlideshow(id, exercises);
                } else {
                    showEmpty(id);
                }
            });
        }

        loadData();
    </script>
</body>
</html>
